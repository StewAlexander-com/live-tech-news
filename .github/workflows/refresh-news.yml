name: Refresh news

on:
  schedule:
    # Every 15 minutes (best-effort; GitHub cron typically lags 5-15 min).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}    # allow manual runs from the Actions tab
  push:
    branches: [ main ]
    paths:
      - "scripts/update_news.py"
      - ".github/workflows/refresh-news.yml"

# The workflow needs write permission to commit data/news.json back to the repo.
permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run ingestion
        env:
          # Optional — only used if you add this secret in repo settings.
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          LTN_REPO_URL: "https://github.com/${{ github.repository }}"
        run: python scripts/update_news.py

      - name: Commit updated snapshot
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash the freshly generated snapshot so we can replay it on top of
          # remote HEAD no matter what the rebase would otherwise do to it.
          cp data/news.json /tmp/news.fresh.json

          for attempt in 1 2 3 4 5; do
            # Reset to remote HEAD, then replay our fresh snapshot on top.
            # Local snapshot is always authoritative (newest reading).
            git fetch origin main --quiet
            git reset --hard origin/main --quiet

            cp /tmp/news.fresh.json data/news.json
            git add data/news.json

            if git diff --cached --quiet; then
              echo "Remote already has identical snapshot. Done."
              exit 0
            fi

            git commit -m "chore(data): refresh news snapshot" --quiet

            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi

            echo "Push attempt $attempt rejected; will reset and retry."
            sleep $((attempt * 3))
          done
          echo "Giving up after 5 push attempts." >&2
          exit 1
