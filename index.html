<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Live Tech News Board</title>
  <meta name="description" content="Rotating live-ish tech news board: Gadgets, Innovation, AI, and Science (tech-bent). Auto-refreshes, fuzzy searchable, 90-day archive." />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tech News" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-180.png" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body data-theme="dark">
  <header class="top">
    <div class="brand" id="brand" role="button" tabindex="0" aria-label="Live Tech News Board (triple-tap for diagnostics)">
      <span class="pulse" aria-hidden="true"></span>
      <h1>Live Tech News Board</h1>
      <span class="tag">Curated tech headlines · 90-day archive</span>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Search headlines, sources… (press /)" aria-label="Search headlines" autocomplete="off" />
      <button id="refresh" title="Refresh now" aria-label="Refresh now">↻ Refresh</button>
      <button id="theme" title="Toggle theme" aria-label="Toggle theme">☾</button>
    </div>
  </header>

  <section id="status" class="status" aria-live="polite"></section>

  <nav id="laneNav" class="lane-nav" aria-label="Jump to category">
    <!-- Lane tabs injected by JS -->
  </nav>

  <nav id="filters" class="filters" aria-label="Filter headlines">
    <button type="button" class="chip active" data-filter="all" aria-pressed="true">All</button>
    <button type="button" class="chip" data-filter="breaking" aria-pressed="false">Breaking</button>
    <button type="button" class="chip" data-filter="today" aria-pressed="false">Today</button>
  </nav>

  <section id="topStories" class="top-stories" hidden aria-label="Top stories">
    <header class="top-stories-head">
      <h2>Top stories</h2>
      <span class="top-stories-hint">High-impact · last 24h</span>
    </header>
    <ol id="topStoriesList" class="top-stories-list"></ol>
  </section>

  <!-- Hidden diagnostics (triple-tap the title to reveal) -->
  <section id="diagPanel" class="diag" hidden aria-label="Diagnostics">
    <div class="diag-head">
      <strong>Diagnostics</strong>
      <button id="diagClose" aria-label="Close diagnostics">✕</button>
    </div>
    <dl id="diagBody"></dl>
    <div class="diag-actions">
      <button id="diagHardReload">Hard reload (bust SW cache)</button>
      <button id="diagCopy">Copy report</button>
    </div>
  </section>

  <main id="board" class="board">
    <!-- Lanes injected by JS -->
  </main>

  <section id="searchResults" class="search-results" hidden>
    <h2>Search results <span id="searchCount" class="muted"></span></h2>
    <ol id="searchList"></ol>
  </section>

  <footer class="foot">
    <span id="lastUpdated">Loading…</span>
    <span class="sep">·</span>
    <span>Lanes rotate every 5 min (staggered) · data every <span id="pollMin">5</span> min</span>
    <span class="sep">·</span>
    <a href="https://github.com/stewalexander-com/live-tech-news" id="repoLink" rel="noopener">View repo</a>
    <span class="sep">·</span>
    <button id="installBtn" hidden title="Install as app">Install app</button>
  </footer>

  <!-- Fuse.js via CDN (pinned) -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
  <script src="./assets/js/app.js" defer></script>
</body>
</html>
